version: "3.9"

services:
  oblvn:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "5173:5173"
    env_file:
      - ../.env
    volumes:
      - oblvn_data:/root/.oblvn
    restart: unless-stopped
    networks:
      - oblvn_net

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_certs:/etc/nginx/certs
    depends_on:
      - oblvn
    restart: unless-stopped
    networks:
      - oblvn_net

volumes:
  oblvn_data:
  nginx_certs:

networks:
  oblvn_net:
    driver: bridge
